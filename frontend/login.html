<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SkillPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="login.css">
</head>
<body class="bg-gray-100">

    <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100">
        <div class="grid md:grid-cols-2 gap-8 max-w-4xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
            
            <div class="hidden md:flex flex-col items-center justify-center p-12 bg-gradient-to-br from-blue-500 to-indigo-600 text-white">
                <div class="flex items-center space-x-3 mb-6">
                    <svg class="w-12 h-12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7V17L12 22L22 17V7L12 2Z" fill="url(#grad1)"/>
                        <path d="M12 12L22 7" stroke="white" stroke-opacity="0.5" stroke-width="1"/>
                        <path d="M12 12V22" stroke="white" stroke-opacity="0.5" stroke-width="1"/>
                        <path d="M12 12L2 7" stroke="white" stroke-opacity="0.5" stroke-width="1"/>
                        <path d="M17 4.5L7 9.5" stroke="white" stroke-opacity="0.5" stroke-width="1"/>
                        <defs>
                            <linearGradient id="grad1" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#38bdf8"/>
                                <stop offset="1" stop-color="#818cf8"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <span class="text-4xl font-bold tracking-wider">SkillPay</span>
                </div>
                <p class="text-center text-indigo-100">Unlock your potential. Monetize your skills. Welcome to the future of learning and earning.</p>
            </div>

            <div class="p-8 md:p-12">
                <h2 class="text-3xl font-bold text-gray-800 mb-2">Sign In</h2>
                <p class="text-gray-500 mb-8">Welcome back! Please enter your details.</p>

                <!-- ✅ Removed action, added JS handling -->
                <form id="loginForm">
                    <div class="space-y-6">
                        <div>
                            <label for="email" class="text-sm font-medium text-gray-700">Email</label>
                            <div class="mt-1 relative rounded-md shadow-sm">
                                <div class="pointer-events-none absolute inset-y-0 left-0 pl-3 flex items-center">
                                    <i data-lucide="mail" class="h-5 w-5 text-gray-400"></i>
                                </div>
                                <input type="email" id="email" class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition duration-150" placeholder="you@example.com" required>
                            </div>
                        </div>

                        <div>
                            <label for="password" class="text-sm font-medium text-gray-700">Password</label>
                            <div class="mt-1 relative rounded-md shadow-sm">
                                <div class="pointer-events-none absolute inset-y-0 left-0 pl-3 flex items-center">
                                    <i data-lucide="lock" class="h-5 w-5 text-gray-400"></i>
                                </div>
                                <input type="password" id="password" class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition duration-150" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="flex items-center justify-between text-sm">
                            <div class="flex items-center">
                                <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                                <label for="remember-me" class="ml-2 block text-gray-900">Remember me</label>
                            </div>
                            <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">Forgot password?</a>
                        </div>

                        <div>
                            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-transform transform hover:scale-105">
                                Sign in
                            </button>
                        </div>
                    </div>
                </form>

                <div class="mt-6">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-300"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-white text-gray-500">Or continue with</span>
                        </div>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-1 gap-3">
                    <a href="#" class="w-full inline-flex justify-center py-3 px-4 border border-gray-300 rounded-lg shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 transition duration-150">
                        <img class="h-5 w-5" src="https://www.svgrepo.com/show/50809/google.svg" alt="Google">
                        <span class="ml-2">Sign in with Google</span>
                    </a>
                </div>

                <div class="mt-6 text-center text-sm text-gray-600">
                    <p>
                        Not a member?
                        <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">Create new account</a>
                    </p>
                    <p class="mt-2">
                        <a href="select.html" class="font-medium text-gray-500 hover:text-gray-700">Continue as Guest</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const API_BASE = (location.port === '3000') ? '' : 'http://localhost:3000';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!email || !password) return alert('Please fill in all fields.');

            try {
                const payload = { email, password };
                let resp = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) {
                    // Fallback to same-origin in case cross-origin fails
                    resp = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }
                const data = await resp.json();
                if (!resp.ok || !data.success) {
                    const msg = data && data.message ? data.message : 'Login failed';
                    return alert(msg);
                }
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                alert('Login successful!');
                window.location.href = 'select.html';
            } catch (err) {
                console.error('Login error:', err);
                alert('Network error. Proceeding as guest.');
                window.location.href = 'select.html';
            }
        });
    </script>

</body>
</html>
